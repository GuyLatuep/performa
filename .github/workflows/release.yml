name: Release

# Builds signed-ready macOS and Windows bundles when a version tag is pushed.
# Push a tag like `v0.1.0` to trigger a draft GitHub Release with the artifacts.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon only
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest # NSIS installer only (no .msi)
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags, needed to diff commits against the last release.
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The app's runtime version (used by the in-app update check) and the
      # bundle filenames come from tauri.conf.json / Cargo.toml, not the git
      # tag. Stamp both from the tag (e.g. v0.2.0 -> 0.2.0) so releases are
      # always correctly versioned without manual bumps.
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'),p='src-tauri/tauri.conf.json',j=JSON.parse(fs.readFileSync(p));j.version='$VERSION';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')"
          VERSION="$VERSION" node -e "const fs=require('fs'),p='src-tauri/Cargo.toml';fs.writeFileSync(p,fs.readFileSync(p,'utf8').replace(/^version = \".*\"$/m,'version = \"'+process.env.VERSION+'\"'))"
          echo "Stamped version $VERSION"
          grep -m1 '^version' src-tauri/Cargo.toml

      # Draft release notes: every commit since the previous version tag.
      - name: Generate release notes
        id: notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PREV="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$PREV" ]; then
            RANGE="$PREV..$GITHUB_REF_NAME"
          else
            RANGE="$GITHUB_REF_NAME"
          fi
          {
            echo "body<<NOTES_EOF"
            echo "## Changes since ${PREV:-the beginning}"
            echo
            git log --no-merges --pretty=format:"- %s (%h)" "$RANGE"
            echo
            if [ -n "$PREV" ]; then
              echo
              echo "**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${GITHUB_REF_NAME}"
            fi
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS signing & notarization (optional; set as repo secrets) ---
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- Updater artifact signing (required for in-app updates) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "performa ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
